# Experiment 0: Numerics Sanity Checks
# Verify that linear solves, function evaluation, and tolerance choices
# are not the precision bottleneck.

name: sanity_checks
seeds: [0]
widths: [16, 32, 64, 128, 256]

target: sine

construction:
  enabled: true
  precision: fp64   # compare against precision=mpmath in run.py
  Kc: 160           # do NOT use Kc<80 - cardinal coefs don't decay fast enough
  # halo: leave null so default_halo(N, lambda_star) is used

init:
  from_construction: true
  readout_solve: lstsq  # compare lstsq, qr, svd, ridge in run.py

n_train: 256
n_eval: 2048
sampling: equispaced
