# Experiment 1: Lambda Tradeoff Verification
# Trace the U-shaped error-vs-lambda curve predicted by QI theory.
# Aliasing at large lambda, ill-conditioning at small lambda.
#
# The viable regime sits around lambda in [0.20, 0.35]. At lambda >= 0.5 the
# intrinsic aliasing exp(-pi^2/lambda) exceeds 1e-4. At lambda < 0.2 the fp64
# Toeplitz solve becomes ill-conditioned. Sweep spans both sides to show the U.

name: lambda_tradeoff
widths: [16, 32, 64, 128, 256]
targets: [sine, runge, exp, sine_mixture]

construction:
  precision: fp64
  Kc: 160

n_eval: 2048

lambda_sweep: [0.01, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.50, 0.75, 1.0]
